<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Signal Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #080f1e;
    --bg2: #0c1628;
    --bg3: #112038;
    --border: #1a3358;
    --border2: #1e4070;
    --text: #b8cff0;
    --text2: #5b7fa8;
    --text3: #2e4d70;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --purple: #a855f7;
    --teal: #14b8a6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-left { display: flex; flex-direction: column; gap: 2px; }
  .topbar-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .topbar-sub { font-size: 11px; color: var(--text3); }

  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  .status-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); animation: none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .refresh-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* MAIN */
  .main { padding: 20px 24px; max-width: 1300px; margin: 0 auto; }

  /* ERROR BAR */
  .error-bar {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    color: #fca5a5;
    padding: 10px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 12px;
    display: none;
  }
  .error-bar.show { display: block; }

  /* STAT CARDS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .stat-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; color: #fff; }
  .stat-value.green { color: var(--green); }
  .stat-value.dim { color: var(--text2); font-size: 22px; }

  /* CHART */


  /* CONTROLS */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }

  .slider-wrap { display: flex; align-items: center; gap: 10px; }
  .slider-wrap input[type=range] {
    -webkit-appearance: none;
    width: 160px; height: 4px;
    background: var(--border2);
    border-radius: 2px;
    outline: none;
  }
  .slider-wrap input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
  }
  .slider-val { color: var(--accent); font-size: 12px; min-width: 28px; }

  .wallets-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .wallet-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 11px;
    color: var(--text2);
  }
  .wallet-pill.active { border-color: currentColor; color: inherit; background: rgba(255,255,255,0.04); }
  .wallet-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .wallet-pill .wstats { font-size: 10px; color: var(--text3); margin-left: 2px; }
  .wallet-pill.active .wstats { color: inherit; opacity: 0.6; }

  .region-btns { display: flex; gap: 6px; margin-left: auto; }
  .region-btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .region-btn.active, .region-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* FEED */
  .feed-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

  .feed-empty {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 40px;
    text-align: center;
    color: var(--text3);
    font-size: 12px;
  }

  .trade-row {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 6px;
    display: grid;
    grid-template-columns: 22px 90px 1fr 80px 70px 60px 90px;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .trade-row:hover { border-color: var(--border2); background: var(--bg3); }

  .trade-side {
    width: 32px; height: 22px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .trade-side.buy-yes  { background: rgba(34,197,94,0.18);  color: #22c55e; }
  .trade-side.buy-no   { background: rgba(239,68,68,0.18);  color: #ef4444; }
  .trade-side.sell-yes { background: rgba(251,146,60,0.18); color: #fb923c; }
  .trade-side.sell-no  { background: rgba(251,146,60,0.18); color: #fb923c; }

  .trade-time { font-size: 11px; color: var(--text3); }
  .trade-market { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .trade-outcome { font-size: 11px; }
  .trade-outcome.yes { color: var(--green); }
  .trade-outcome.no { color: var(--red); }
  .trade-price { font-size: 13px; color: var(--text); text-align: right; }
  .trade-size { font-size: 12px; color: var(--yellow); text-align: right; }
  .trade-wallet { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
  .trade-wallet .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .trade-wallet .wname { font-size: 11px; color: var(--text2); }

  /* SKELETON */
  .skel {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 28px;
    max-width: 480px; width: 90%;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; color: var(--text2);
    font-size: 20px; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: #fff; }
  .modal h3 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 16px; line-height: 1.3; }
  .modal-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .modal-row:last-child { border-bottom: none; }
  .modal-key { color: var(--text3); }
  .modal-val { color: var(--text); text-align: right; }
  .modal-val.green { color: var(--green); }
  .modal-val.red { color: var(--red); }
  .modal-val.yellow { color: var(--yellow); }
  .modal-link { display: block; margin-top: 16px; text-align: center; color: var(--accent); font-size: 12px; text-decoration: none; }
  .modal-link:hover { text-decoration: underline; }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .trade-row { grid-template-columns: 22px 1fr 60px 50px; }
    .trade-time, .trade-outcome, .trade-wallet { display: none; }
    .main { padding: 12px 14px; }
    .topbar { padding: 12px 14px; }
    .region-btns { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">PM Signal Tracker</div>
    <div class="topbar-sub">updated <span id="lastUpdate">—</span></div>
  </div>
  <div class="topbar-right">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText" style="font-size:11px;color:var(--text3)">loading</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻ refresh</button>
  </div>
</div>

<div class="main">
  <div class="error-bar" id="errorBar"></div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Trades Today</div>
      <div class="stat-value" id="statToday">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Above Filter</div>
      <div class="stat-value green" id="statAbove">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Price</div>
      <div class="stat-value dim" id="statAvg">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Volume</div>
      <div class="stat-value dim" id="statVol">—</div>
    </div>
  </div>



  <div class="controls-row">
    <span class="filter-label">Min Size</span>
    <div class="slider-wrap">
      <input type="range" min="1" max="100" value="5" id="minSlider" oninput="onSlider()">
      <span class="slider-val" id="sliderVal">$5</span>
    </div>
    <div class="wallets-row" id="walletsRow"></div>
    <div class="region-btns">
      <button class="region-btn active" onclick="setRegion('ALL',this)">ALL</button>
      <button class="region-btn" onclick="setRegion('USA',this)">USA</button>
      <button class="region-btn" onclick="setRegion('EUROPE',this)">EUROPE</button>
      <button class="region-btn" onclick="setRegion('ASIA',this)">ASIA</button>
    </div>
  </div>

  <div class="feed-label">Trade Feed — Tap any row for details + link</div>
  <div id="feedWrap"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <a id="modalLink" class="modal-link" href="#" target="_blank">View on Polymarket ↗</a>
  </div>
</div>

<script>
const WALLETS = [
  { name: "Maskache2",  address: "0x1f66796B45581868376365AeF54b51Eb84184C8D", color: "#22c55e" },
  { name: "securebet",  address: "0xaA7a74B8C754E8AaCC1Ac2dEDB699Af0a3224d23", color: "#60a5fa" },
  { name: "BeefSlayer", address: "0x331BF91C132af9d921e1908cA0979363Fc47193f", color: "#f59e0b" },
  { name: "mjf02",      address: "0x5eA284bB13db26c76529a944E6Bf9497c8c5e97F", color: "#c084fc" },
  { name: "0xhana",     address: "0xa37d1d1a3367c6ebc692e37c29bccb8bb015b2b4", color: "#14b8a6" },
];

// State
let allTrades = [];
let walletStats = {};
let activeWallets = new Set(WALLETS.map(w => w.name));
let minSize = 5;
let activeRegion = 'ALL';

// CORS proxy — tries direct first, falls back to proxy
async function fetchActivity(address) {
  const url = `https://data-api.polymarket.com/activity?user=${address}&limit=200`;
  // Try direct first
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
    if (r.ok) return await r.json();
  } catch(e) {}
  // CORS proxy fallback
  try {
    const proxy = `https://corsproxy.io/?url=${encodeURIComponent(url)}`;
    const r = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
    if (r.ok) return await r.json();
  } catch(e) {}
  return [];
}

function todayStart() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return Math.floor(d.getTime() / 1000);
}

function fmt(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}

function fmtDate(ts) {
  return new Date(ts * 1000).toLocaleString('en-GB', {
    day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'
  });
}

function buildWalletPills() {
  const row = document.getElementById('walletsRow');
  row.innerHTML = '';
  WALLETS.forEach(w => {
    const stats = walletStats[w.name] || { buys:0, sells:0, last:'never' };
    const active = activeWallets.has(w.name);
    const pill = document.createElement('div');
    pill.className = 'wallet-pill' + (active ? ' active' : '');
    pill.style.color = active ? w.color : '';
    pill.innerHTML = `
      <div class="dot" style="background:${w.color}"></div>
      ${w.name}
      <span class="wstats">${stats.buys}Y / ${stats.sells}N / S${stats.vol||0} ${stats.last}</span>
    `;
    pill.onclick = () => toggleWallet(w.name, pill, w.color);
    row.appendChild(pill);
  });
}

function toggleWallet(name, el, color) {
  if (activeWallets.has(name)) {
    activeWallets.delete(name);
    el.classList.remove('active');
    el.style.color = '';
  } else {
    activeWallets.add(name);
    el.classList.add('active');
    el.style.color = color;
  }
  renderFeed();
}

function setRegion(r, btn) {
  activeRegion = r;
  document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function onSlider() {
  minSize = parseInt(document.getElementById('minSlider').value);
  document.getElementById('sliderVal').textContent = '$' + minSize;
  renderFeed();
}

function regionOf(title) {
  if (!title) return 'OTHER';
  const t = title.toLowerCase();
  const us = ['chicago','atlanta','dallas','miami','new york','seattle','los angeles','boston','houston','phoenix','denver'];
  const eu = ['london','paris','berlin','madrid','rome','amsterdam','brussels','vienna','warsaw','lisbon'];
  const as = ['tokyo','beijing','shanghai','hong kong','singapore','dubai','mumbai','seoul','taipei','bangkok'];
  if (us.some(c => t.includes(c))) return 'USA';
  if (eu.some(c => t.includes(c))) return 'EUROPE';
  if (as.some(c => t.includes(c))) return 'ASIA';
  return 'OTHER';
}

function renderFeed() {
  const today = todayStart();
  const visible = allTrades.filter(t => {
    if (!activeWallets.has(t._wallet)) return false;
    if (t.usdcSize < minSize) return false;
    if (activeRegion !== 'ALL' && regionOf(t.title) !== activeRegion) return false;
    return true;
  });

  // Stats
  const todayTrades = allTrades.filter(t => t.timestamp >= today && activeWallets.has(t._wallet));
  const todayAbove = todayTrades.filter(t => t.usdcSize >= minSize);
  const avgPrice = todayAbove.length ? (todayAbove.reduce((s,t) => s+t.price, 0)/todayAbove.length) : null;
  const vol = todayAbove.reduce((s,t) => s+t.usdcSize, 0);

  document.getElementById('statToday').textContent = todayTrades.length || '0';
  document.getElementById('statAbove').textContent = todayAbove.length || '0';
  document.getElementById('statAvg').textContent = avgPrice ? avgPrice.toFixed(2) : '—';
  document.getElementById('statVol').textContent = vol ? '$'+Math.round(vol) : '—';

  const wrap = document.getElementById('feedWrap');
  if (!visible.length) {
    wrap.innerHTML = `<div class="feed-empty">No trades above $${minSize} — adjust filter or refresh</div>`;
    return;
  }
  wrap.innerHTML = '';
  visible.slice(0, 100).forEach(t => {
    const w = WALLETS.find(x => x.name === t._wallet);
    const row = document.createElement('div');
    row.className = 'trade-row';
    const badgeClass = t.side==='BUY' ? (t.outcome==='Yes'?'buy-yes':'buy-no') : (t.outcome==='Yes'?'sell-yes':'sell-no');
    const badgeText = (t.side==='BUY'?'B':'S')+' '+(t.outcome==='Yes'?'Y':'N');
    row.innerHTML = `
      <div class="trade-side ${badgeClass}">${badgeText}</div>
      <div class="trade-time">${fmt(t.timestamp)}</div>
      <div class="trade-market">${t.title||'—'}</div>
      <div class="trade-outcome ${t.outcome==='Yes'?'yes':'no'}">${t.outcome||'—'}</div>
      <div class="trade-price">${(t.price*100).toFixed(0)}¢</div>
      <div class="trade-size">$${Math.round(t.usdcSize)}</div>
      <div class="trade-wallet">
        <div class="dot" style="background:${w?.color||'#888'}"></div>
        <span class="wname">${t._wallet}</span>
      </div>
    `;
    row.onclick = () => openModal(t);
    wrap.appendChild(row);
  });
}



function calcPnl(t) {
  // Find prior BUY trades from same wallet for same asset (token)
  if (!t.asset || !t._wallet) return null;
  const buys = allTrades.filter(b =>
    b._wallet === t._wallet &&
    b.asset === t.asset &&
    b.side === 'BUY' &&
    b.timestamp < t.timestamp
  );
  if (!buys.length) return null;
  const totalShares = buys.reduce((s,b) => s + (b.size||0), 0);
  const totalUsdc   = buys.reduce((s,b) => s + (b.usdcSize||0), 0);
  if (!totalShares) return null;
  const avgBuy = totalUsdc / totalShares;
  const sellShares = t.size || 0;
  const pnl = (t.price - avgBuy) * sellShares;
  return { pnl, avgBuy, sellShares };
}

function openModal(t) {
  document.getElementById('modalTitle').textContent = t.title || '—';

  const side    = t.side    || '—';
  const outcome = t.outcome || '—';
  const isSell  = t.side === 'SELL';
  const sideColor = side === 'BUY' ? 'green' : side === 'SELL' ? 'red' : '';
  const outcomeColor = outcome === 'Yes' ? 'green' : outcome === 'No' ? 'red' : '';

  let pnlRow = '';
  if (isSell) {
    const result = calcPnl(t);
    if (result !== null) {
      const { pnl, avgBuy } = result;
      const sign   = pnl >= 0 ? '+' : '';
      const cls    = pnl >= 0 ? 'green' : 'red';
      const label  = pnl >= 0 ? '✓ Profit' : '✗ Loss';
      pnlRow = `
        <div class="modal-row" style="border-top:1px solid var(--border2);margin-top:6px;padding-top:12px">
          <span class="modal-key">Est. P&L</span>
          <span class="modal-val ${cls}" style="font-size:15px;font-weight:700">${label} ${sign}$${Math.abs(pnl).toFixed(2)}</span>
        </div>
        <div class="modal-row">
          <span class="modal-key">Avg Buy Price</span>
          <span class="modal-val">${(avgBuy*100).toFixed(1)}¢</span>
        </div>
        <div class="modal-row">
          <span class="modal-key">Sell Price</span>
          <span class="modal-val">${(t.price*100).toFixed(1)}¢</span>
        </div>`;
    } else {
      pnlRow = `<div class="modal-row"><span class="modal-key">Est. P&L</span><span class="modal-val" style="color:var(--text3)">No matching buys in feed</span></div>`;
    }
  }

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-row"><span class="modal-key">Wallet</span><span class="modal-val">${t._wallet}</span></div>
    <div class="modal-row"><span class="modal-key">Side</span><span class="modal-val ${sideColor}">${side}</span></div>
    <div class="modal-row"><span class="modal-key">Outcome</span><span class="modal-val ${outcomeColor}">${outcome}</span></div>
    <div class="modal-row"><span class="modal-key">Size (USDC)</span><span class="modal-val yellow">$${t.usdcSize?.toFixed(2)||'—'}</span></div>
    <div class="modal-row"><span class="modal-key">Shares</span><span class="modal-val">${t.size?.toFixed(0)||'—'}</span></div>
    <div class="modal-row"><span class="modal-key">Time</span><span class="modal-val">${fmtDate(t.timestamp)}</span></div>
    <div class="modal-row"><span class="modal-key">TX</span><span class="modal-val" style="font-size:10px">${(t.transactionHash||'').slice(0,18)}…</span></div>
    ${pnlRow}
  `;
  const link = document.getElementById('modalLink');
  link.href = t.slug ? `https://polymarket.com/event/${t.slug}` : '#';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || e.currentTarget?.classList?.contains('modal-close')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  const dot = document.getElementById('statusDot');
  const statusTxt = document.getElementById('statusText');
  const errBar = document.getElementById('errorBar');

  btn.disabled = true;
  btn.textContent = '…';
  dot.className = 'status-dot';
  statusTxt.textContent = 'loading';
  errBar.classList.remove('show');

  allTrades = [];
  walletStats = {};
  let anyData = false;
  let errors = [];

  await Promise.all(WALLETS.map(async w => {
    try {
      const data = await fetchActivity(w.address);
      if (!Array.isArray(data)) { errors.push(w.name + ': bad response'); return; }
      if (data.length) anyData = true;
      const trades = data.map(t => ({ ...t, _wallet: w.name }));
      allTrades.push(...trades);
      const today = todayStart();
      const todayT = trades.filter(t => t.timestamp >= today);
      walletStats[w.name] = {
        buys: todayT.filter(t=>t.side==='BUY').length,
        sells: todayT.filter(t=>t.side==='SELL').length,
        vol: Math.round(todayT.reduce((s,t)=>s+(t.usdcSize||0),0)),
        last: trades.length ? fmt(trades[0].timestamp) : 'never'
      };
    } catch(e) {
      errors.push(w.name + ': ' + e.message);
    }
  }));

  // Sort by time desc
  allTrades.sort((a,b) => b.timestamp - a.timestamp);

  if (!anyData) {
    errBar.textContent = 'No data returned — API may be temporarily down. Retrying next refresh.';
    errBar.classList.add('show');
    dot.className = 'status-dot error';
    statusTxt.textContent = 'error';
  } else if (errors.length) {
    errBar.textContent = 'Partial data: ' + errors.join(', ');
    errBar.classList.add('show');
    dot.className = 'status-dot';
    statusTxt.textContent = 'partial';
  } else {
    dot.className = 'status-dot';
    statusTxt.textContent = 'live';
  }

  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

  buildWalletPills();
  renderFeed();

  btn.disabled = false;
  btn.textContent = '↻ refresh';
}

// Auto-refresh every 90s
setInterval(loadAll, 90000);
loadAll();
</script>
