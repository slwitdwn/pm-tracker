<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Signal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #1a1f3c;
  --surface:   #222847;
  --surface2:  #2a3057;
  --border:    #313a6a;
  --border2:   #3d4880;
  --text:      #e4e8ff;
  --text2:     #8b96cc;
  --text3:     #5560a0;
  --green:     #34d399;
  --green-row: #34d39912;
  --green-bdr: #34d39945;
  --red:       #f87171;
  --red-row:   #f8717112;
  --red-bdr:   #f8717145;
  --amber:     #fbbf24;
  --amber-row: #fbbf2412;
  --amber-bdr: #fbbf2445;
  --blue:      #93c5fd;
  --purple:    #c4b5fd;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.shell { max-width: 1000px; margin: 0 auto; padding: 24px 16px 60px; }

/* Header */
.header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
.header-left h1 { font-size: 17px; font-weight: 500; letter-spacing: -0.01em; color: var(--text); }
.header-left p { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 4px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.refresh-btn { font-family: var(--mono); font-size: 11px; padding: 6px 12px; background: transparent; border: 1px solid var(--border2); color: var(--text2); border-radius: 4px; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.refresh-btn:hover { border-color: var(--blue); color: var(--blue); }
.refresh-btn.loading { opacity: .4; pointer-events: none; }
.dot-live { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
.countdown { font-family: var(--mono); font-size: 11px; color: var(--text3); min-width: 36px; text-align: right; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 20px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.s-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.s-val { font-size: 22px; font-weight: 300; letter-spacing: -0.02em; color: var(--text); }
.s-val.green { color: var(--green); }
.s-val.amber { color: var(--amber); }
.s-val.blue  { color: var(--blue); }

/* Mini chart */
.chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 20px; }
.chart-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.chart-bars { display: flex; align-items: flex-end; gap: 3px; height: 40px; }
.chart-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
.chart-bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; transition: height .3s ease; }
.chart-bar.buy-bar  { background: var(--green); opacity: .7; }
.chart-bar.sell-bar { background: var(--red); opacity: .7; }
.chart-hr { font-family: var(--mono); font-size: 9px; color: var(--text3); }

/* Filter */
.filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-bar label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
.filter-bar input[type=range] { flex: 1; max-width: 140px; accent-color: var(--purple); }
.filter-val { font-family: var(--mono); font-size: 11px; color: var(--text2); min-width: 36px; }

/* Wallet pills */
.wallets-row { display: flex; gap: 7px; margin-bottom: 12px; flex-wrap: wrap; }
.wallet-pill { display: flex; align-items: center; gap: 7px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 11px 5px 8px; cursor: pointer; transition: all .15s; user-select: none; }
.wallet-pill:hover { border-color: var(--border2); }
.wallet-pill.active { border-color: var(--border2); background: var(--surface2); }
.wallet-pill.inactive-wallet { opacity: .45; }
.wp-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.wp-name { font-family: var(--mono); font-size: 11px; color: var(--text2); }
.wallet-pill.active .wp-name { color: var(--text); }
.wp-tally { display: flex; align-items: center; gap: 3px; margin-left: 1px; }
.wp-b { font-family: var(--mono); font-size: 10px; color: var(--green); }
.wp-s { font-family: var(--mono); font-size: 10px; color: var(--red); }
.wp-sell { font-family: var(--mono); font-size: 10px; color: var(--amber); }
.wp-sep { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.wp-ago { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-left: 4px; }

/* Region filter */
.region-bar { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.region-btn { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; transition: all .15s; }
.region-btn:hover { border-color: var(--border2); color: var(--text2); }
.region-btn.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }

/* Time group headers */
.time-group { margin-bottom: 4px; }
.time-group-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; padding: 10px 14px 6px; display: flex; align-items: center; gap: 8px; }
.time-group-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Feed */
.section-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
.feed { display: flex; flex-direction: column; gap: 2px; }

.feed-row {
  border: 1px solid transparent; border-radius: 8px;
  transition: filter .12s; cursor: pointer;
  animation: fadeIn .25s ease;
  overflow: hidden;
}
.feed-row.row-yes  { background: var(--green-row); border-color: var(--green-bdr); }
.feed-row.row-no   { background: var(--red-row);   border-color: var(--red-bdr); }
.feed-row.row-sell { background: var(--amber-row); border-color: var(--amber-bdr); }
.feed-row:hover { filter: brightness(1.15); }
@keyframes fadeIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }

/* Row main content */
.row-main { display: grid; grid-template-columns: 52px 1fr 100px 80px 55px 65px 24px; gap: 10px; align-items: center; padding: 10px 14px; }

/* Market icon */
.market-icon { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
.market-icon-placeholder { width: 36px; height: 36px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }

.f-market-wrap { min-width: 0; }
.f-market { font-size: 13px; color: var(--text); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.f-time-inline { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 3px; }
.f-new-badge { display: inline-block; font-family: var(--mono); font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--green); color: #0a0a0a; margin-left: 5px; vertical-align: middle; animation: blink 1.5s ease 3; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.f-wallet { font-family: var(--mono); font-size: 11px; white-space: nowrap; }
.f-side { font-family: var(--mono); font-size: 11px; font-weight: 500; white-space: nowrap; }
.f-side.yes  { color: var(--green); }
.f-side.no   { color: var(--red); }
.f-side.sell { color: var(--amber); }
.f-price { font-family: var(--mono); font-size: 12px; color: var(--text2); white-space: nowrap; }
.f-price.low-price { color: var(--amber); font-weight: 500; }
.f-size-col { text-align: right; }
.size-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.size-num { font-family: var(--mono); font-size: 12px; color: var(--text); }
.size-bar-bg { width: 44px; height: 2px; background: var(--border2); border-radius: 1px; }
.size-bar-fill { height: 100%; border-radius: 1px; }
.expand-arrow { font-size: 10px; color: var(--text3); transition: transform .2s; user-select: none; }
.feed-row.expanded .expand-arrow { transform: rotate(180deg); }

/* Expanded detail panel */
.row-detail { display: none; padding: 0 14px 12px; border-top: 1px solid var(--border); margin-top: 0; }
.feed-row.expanded .row-detail { display: block; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.detail-item .d-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
.detail-item .d-val { font-family: var(--mono); font-size: 12px; color: var(--text); word-break: break-all; }
.open-market-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; font-family: var(--mono); font-size: 11px; padding: 6px 14px; background: transparent; border: 1px solid var(--border2); border-radius: 4px; color: var(--blue); text-decoration: none; transition: all .15s; }
.open-market-btn:hover { border-color: var(--blue); background: #93c5fd15; }

.feed-empty { text-align: center; padding: 52px 0; font-family: var(--mono); font-size: 12px; color: var(--text3); }
.error-banner { background: #f8717112; border: 1px solid #f8717144; border-radius: 6px; padding: 10px 14px; font-family: var(--mono); font-size: 11px; color: var(--red); margin-bottom: 14px; display: none; }
.error-banner.show { display: block; }

@media (max-width: 640px) {
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .chart-box { display: none; }
  .row-main { grid-template-columns: 36px 1fr 70px 24px; gap: 8px; }
  .f-wallet { display: none; }
  .f-price { display: none; }
  .f-size-col { display: none; }
  .f-side { font-size: 10px; }
  .market-icon, .market-icon-placeholder { width: 28px; height: 28px; }
}
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="header-left">
      <h1>PM Signal Tracker</h1>
      <p id="last-updated">last updated —</p>
    </div>
    <div class="header-right">
      <div class="dot-live"></div>
      <span class="countdown" id="countdown">in 90s</span>
      <button class="refresh-btn" id="refresh-btn" onclick="fetchAll()">
        <span id="refresh-icon">↻</span> refresh
      </button>
    </div>
  </div>

  <div id="error-banner" class="error-banner"></div>

  <div class="stats-row">
    <div class="stat-box"><div class="s-label">Trades today</div><div class="s-val" id="stat-total">—</div></div>
    <div class="stat-box"><div class="s-label">Above filter</div><div class="s-val green" id="stat-filtered">—</div></div>
    <div class="stat-box"><div class="s-label">Avg price</div><div class="s-val blue" id="stat-avg">—</div></div>
    <div class="stat-box"><div class="s-label">Volume</div><div class="s-val amber" id="stat-vol">—</div></div>
  </div>

  <div class="chart-box">
    <div class="chart-label">Activity last 12h (buys vs sells per hour)</div>
    <div class="chart-bars" id="chart-bars"></div>
  </div>

  <div class="filter-bar">
    <label>Min size</label>
    <input type="range" min="1" max="100" value="5" step="1" id="min-filter" oninput="updateFilter()">
    <span class="filter-val" id="filter-val">$5</span>
  </div>

  <div class="wallets-row" id="wallets-row"></div>

  <div class="region-bar" id="region-bar">
    <button class="region-btn active" data-region="ALL" onclick="setRegion('ALL')">ALL</button>
    <button class="region-btn" data-region="USA" onclick="setRegion('USA')">USA</button>
    <button class="region-btn" data-region="EUROPE" onclick="setRegion('EUROPE')">EUROPE</button>
    <button class="region-btn" data-region="ASIA" onclick="setRegion('ASIA')">ASIA</button>
  </div>

  <div class="section-label">Trade feed — tap any row for details + link</div>
  <div class="feed" id="feed">
    <div class="feed-empty">Loading trades…</div>
  </div>

</div>
<script>
const WALLETS = [
  { name: "Maskache2",  address: "0x1f66796b45581868376365aef54b51eb84184c8d", color: "#34d399" },
  { name: "securebet",  address: "0xaa7a74b8c754e8aacc1ac2dedb699af0a3224d23", color: "#93c5fd" },
  { name: "BeefSlayer", address: "0x331bf91c132af9d921e1908ca0979363fc47193f", color: "#fbbf24" },
  { name: "mjf02",      address: "0x5ea284bb13db26c76529a944e6bf9497c8c5e97f", color: "#c4b5fd" },
  { name: "0xhana",     address: "0xa37d1d1a3367c6ebc692e37c29bccb8bb015b2b4", color: "#f472b6" },
];

const REGION_KEYWORDS = {
  USA:    ['Chicago','Atlanta','Dallas','Miami','New York','Seattle','San Francisco','Los Angeles'],
  EUROPE: ['London','Paris','Berlin','Madrid','Rome','Amsterdam','Vienna','Zurich'],
  ASIA:   ['Tokyo','Seoul','Shanghai','Beijing','Singapore','Mumbai','Bangkok','Busan','Shenzhen','Hong Kong'],
};

let allTrades = [];
let seenIds = new Set();
let newIds = new Set();
let activeWallets = new Set(WALLETS.map(w => w.address));
let minSize = 5;
let activeRegion = 'ALL';
let countdownVal = 90;
let countdownTimer = null;

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownVal = 90;
  document.getElementById('countdown').textContent = 'in 90s';
  countdownTimer = setInterval(() => {
    countdownVal--;
    if (countdownVal <= 0) {
      clearInterval(countdownTimer);
      fetchAll();
    } else {
      document.getElementById('countdown').textContent = 'in ' + countdownVal + 's';
    }
  }, 1000);
}

function setRegion(r) {
  activeRegion = r;
  document.querySelectorAll('.region-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.region === r);
  });
  renderFeed();
}

function matchesRegion(title) {
  if (activeRegion === 'ALL') return true;
  const keywords = REGION_KEYWORDS[activeRegion] || [];
  return keywords.some(k => title && title.toLowerCase().includes(k.toLowerCase()));
}

function fmtTime(ts) {
  if (!ts) return '—';
  const diffM = Math.floor((Date.now() - ts * 1000) / 60000);
  if (diffM < 1) return 'just now';
  if (diffM < 60) return diffM + 'm ago';
  const h = Math.floor(diffM / 60);
  if (h < 24) return h + 'h ago';
  return new Date(ts * 1000).toLocaleDateString();
}

function fmtPrice(p) {
  if (p == null) return '—';
  const c = p * 100;
  return (c < 10 ? c.toFixed(1) : Math.round(c)) + '¢';
}

function getSide(t) {
  const s = (t.side || '').toUpperCase();
  const idx = t.outcomeIndex;
  if (s === 'SELL') return 'sell';
  if (s === 'BUY' && idx === 1) return 'no';
  return 'yes';
}

function getTimeGroup(ts) {
  const diffM = Math.floor((Date.now() - ts * 1000) / 60000);
  if (diffM < 5)   return '⚡ Last 5 min';
  if (diffM < 30)  return 'Last 30 min';
  if (diffM < 120) return 'Last 2 hours';
  return 'Older';
}

function tradeId(t) {
  return t.transactionHash || (t.timestamp + t.asset + t.side);
}

async function fetchWalletTrades(wallet) {
  const url = `https://data-api.polymarket.com/activity?user=${wallet.address}&limit=100`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    return (Array.isArray(data) ? data : [])
      .filter(t => t.type === 'BUY' || t.type === 'SELL')
      .map(t => ({ ...t, _wallet: wallet }));
  } catch(e) {
    console.warn('Failed:', wallet.name, e.message);
    return [];
  }
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 8000);
}

async function fetchAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  document.getElementById('refresh-icon').textContent = '…';

  const results = await Promise.all(WALLETS.map(fetchWalletTrades));
  const fresh = results.flat();

  newIds.clear();
  fresh.forEach(t => {
    const id = tradeId(t);
    if (seenIds.size > 0 && !seenIds.has(id)) newIds.add(id);
    seenIds.add(id);
  });

  allTrades = fresh;
  if (allTrades.length === 0) showError('No data returned — check wallet addresses.');
  allTrades.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
  document.getElementById('last-updated').textContent = 'updated ' + new Date().toLocaleTimeString();

  renderWalletPills();
  renderChart();
  renderFeed();

  btn.classList.remove('loading');
  document.getElementById('refresh-icon').textContent = '↻';
  startCountdown();
}

function renderWalletPills() {
  const row = document.getElementById('wallets-row');
  row.innerHTML = '';
  WALLETS.forEach(w => {
    const trades = allTrades.filter(t =>
      t._wallet.address === w.address && (t.usdcSize||t.size||0) >= minSize
    );
    const buys  = trades.filter(t => getSide(t) === 'yes').length;
    const nos   = trades.filter(t => getSide(t) === 'no').length;
    const sells = trades.filter(t => getSide(t) === 'sell').length;

    const lastTs = allTrades.filter(t => t._wallet.address === w.address)
      .map(t => t.timestamp||0).sort((a,b)=>b-a)[0];
    const diffH = lastTs ? (Date.now() - lastTs*1000) / 3600000 : 99;
    const agoText = lastTs ? fmtTime(lastTs) : 'never';
    const isInactive = diffH > 3;

    const pill = document.createElement('div');
    pill.className = 'wallet-pill' +
      (activeWallets.has(w.address) ? ' active' : '') +
      (isInactive ? ' inactive-wallet' : '');
    pill.innerHTML = `
      <div class="wp-dot" style="background:${w.color}"></div>
      <span class="wp-name">${w.name}</span>
      <div class="wp-tally">
        <span class="wp-b">${buys}Y</span>
        <span class="wp-sep">/</span>
        <span class="wp-s">${nos}N</span>
        <span class="wp-sep">/</span>
        <span class="wp-sell">S${sells}</span>
      </div>
      <span class="wp-ago">${agoText}</span>`;
    pill.onclick = () => {
      activeWallets.has(w.address) ? activeWallets.delete(w.address) : activeWallets.add(w.address);
      renderWalletPills();
      renderFeed();
    };
    row.appendChild(pill);
  });
}

function renderChart() {
  const container = document.getElementById('chart-bars');
  const now = Date.now();
  const hours = [];
  for (let i = 11; i >= 0; i--) {
    const start = now - (i+1)*3600000;
    const end   = now - i*3600000;
    const bucket = allTrades.filter(t => {
      const ms = (t.timestamp||0)*1000;
      return ms >= start && ms < end;
    });
    const buys  = bucket.filter(t => getSide(t) !== 'sell').length;
    const sells = bucket.filter(t => getSide(t) === 'sell').length;
    const hr = new Date(end).getHours();
    hours.push({ buys, sells, hr });
  }
  const maxVal = Math.max(1, ...hours.map(h => h.buys + h.sells));
  container.innerHTML = hours.map(h => {
    const buyH  = Math.round((h.buys  / maxVal) * 36);
    const sellH = Math.round((h.sells / maxVal) * 36);
    return `<div class="chart-bar-wrap">
      <div style="display:flex;flex-direction:column;justify-content:flex-end;height:36px;gap:1px">
        <div class="chart-bar sell-bar" style="height:${sellH}px"></div>
        <div class="chart-bar buy-bar"  style="height:${buyH}px"></div>
      </div>
      <span class="chart-hr">${h.hr}h</span>
    </div>`;
  }).join('');
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const filtered = allTrades.filter(t =>
    activeWallets.has(t._wallet.address) &&
    (t.usdcSize||t.size||0) >= minSize &&
    matchesRegion(t.title || '')
  );

  const today = new Date(); today.setHours(0,0,0,0);
  const todayAll = allTrades.filter(t => (t.timestamp||0)*1000 >= today.getTime());
  document.getElementById('stat-total').textContent = todayAll.length || '0';
  document.getElementById('stat-filtered').textContent = filtered.length || '0';
  const prices = filtered.map(t => t.price).filter(p => p != null);
  const avgP = prices.length ? prices.reduce((a,b)=>a+b,0)/prices.length : null;
  document.getElementById('stat-avg').textContent = avgP != null ? fmtPrice(avgP) : '—';
  const vol = filtered.reduce((a,t)=>a+(t.usdcSize||t.size||0),0);
  document.getElementById('stat-vol').textContent = vol ? '$'+Math.round(vol) : '—';

  if (!filtered.length) {
    feed.innerHTML = '<div class="feed-empty">No trades above $'+minSize+' — adjust filter or refresh</div>';
    return;
  }

  const maxSize = Math.max(...filtered.map(t => t.usdcSize||t.size||0));

  const groups = {};
  const groupOrder = ['⚡ Last 5 min', 'Last 30 min', 'Last 2 hours', 'Older'];
  filtered.forEach(t => {
    const g = getTimeGroup(t.timestamp||0);
    if (!groups[g]) groups[g] = [];
    groups[g].push(t);
  });

  let html = '';
  groupOrder.forEach(grp => {
    if (!groups[grp] || !groups[grp].length) return;
    html += `<div class="time-group-label">${grp} · ${groups[grp].length}</div>`;
    groups[grp].forEach(t => { html += buildRow(t, maxSize); });
  });

  feed.innerHTML = html;
  feed.querySelectorAll('.feed-row').forEach(row => {
    row.addEventListener('click', () => row.classList.toggle('expanded'));
  });
}

function buildRow(t, maxSize) {
  const w = t._wallet;
  const size = t.usdcSize || t.size || 0;
  const ts = t.timestamp || 0;
  const side = getSide(t);
  const rowClass = side === 'yes' ? 'row-yes' : side === 'no' ? 'row-no' : 'row-sell';
  const sideLabel = side === 'yes' ? '▲ BUY YES' : side === 'no' ? '▼ BUY NO' : '→ SELL';
  const barColor = side === 'yes' ? '#34d399' : side === 'no' ? '#f87171' : '#fbbf24';
  const barPct = maxSize > 0 ? Math.round((size/maxSize)*100) : 0;
  const id = tradeId(t);
  const isNew = newIds.has(id);
  const newBadge = isNew ? '<span class="f-new-badge">NEW</span>' : '';
  const marketUrl = t.eventSlug ? `https://polymarket.com/event/${t.eventSlug}` : 'https://polymarket.com';
  const iconHtml = t.icon
    ? `<img class="market-icon" src="${t.icon}" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="market-icon-placeholder">📊</div>`;
  const title = t.title || 'Weather market';
  const txUrl = t.transactionHash ? `https://polygonscan.com/tx/${t.transactionHash}` : null;
  const preciseTime = fmtTime(ts);
  const clockTime = ts ? new Date(ts*1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
  const isLowPrice = t.price != null && t.price < 0.20;

  return `<div class="feed-row ${rowClass}">
    <div class="row-main">
      ${iconHtml}
      <div class="f-market-wrap">
        <div class="f-market">${title}${newBadge}</div>
        <div class="f-time-inline">${preciseTime} · ${clockTime}</div>
      </div>
      <span class="f-wallet" style="color:${w.color}">${w.name}</span>
      <span class="f-side ${side}">${sideLabel}</span>
      <span class="f-price${isLowPrice ? ' low-price' : ''}">${fmtPrice(t.price)}</span>
      <div class="f-size-col">
        <div class="size-wrap">
          <span class="size-num">$${Math.round(size)}</span>
          <div class="size-bar-bg"><div class="size-bar-fill" style="width:${barPct}%;background:${barColor}"></div></div>
        </div>
      </div>
      <span class="expand-arrow">▼</span>
    </div>
    <div class="row-detail">
      <div class="detail-grid">
        <div class="detail-item"><div class="d-label">Time</div><div class="d-val">${preciseTime} · ${clockTime}</div></div>
        <div class="detail-item"><div class="d-label">Size (shares)</div><div class="d-val">${Math.round(size / (t.price||1))} shares · $${size.toFixed(2)}</div></div>
        <div class="detail-item"><div class="d-label">Outcome</div><div class="d-val">${t.outcome || '—'}</div></div>
        <div class="detail-item"><div class="d-label">Price paid</div><div class="d-val">${fmtPrice(t.price)}</div></div>
      </div>
      <a class="open-market-btn" href="${marketUrl}" target="_blank">↗ Open on Polymarket</a>
      ${txUrl ? `<a class="open-market-btn" href="${txUrl}" target="_blank" style="margin-left:8px">⛓ View tx</a>` : ''}
    </div>
  </div>`;
}

function updateFilter() {
  minSize = parseInt(document.getElementById('min-filter').value);
  document.getElementById('filter-val').textContent = '$' + minSize;
  renderWalletPills();
  renderChart();
  renderFeed();
}

fetchAll();
</script>
</body>
</html>
